<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Micro Toy</title>
  <link rel="manifest" href="/toy/manifest.json" />
  <link rel="icon" href="/toy/icon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#f7c9a5" />
  <link rel="stylesheet" href="/toy/keyboard.css" />
  <style>html, body { margin: 0; height: 100%; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createToyKeyboard } from '/toy/keyboard.js';
    import { createAudio } from '/toy/audio.js';
    import { haptic } from '/toy/haptics.js';
    import { createDemoDirector } from '/toy/demo-script.js';
    import { connectLive } from '/toy/live.js';

    // token 只做鉴权（局域网加载页面必须带它）；模式由显式 ?live=1 决定。
    // 否则手机永远进 Live 模式（因为加载就必须带 token），玩不到 Demo。
    // 默认 Demo：扫码即玩、假 agent 演戏；Live 需 ?token=X&live=1 显式开启。
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const liveMode = params.get('live') === '1' && Boolean(token);

    const profile = localStorage.getItem('toy-profile') || 'pom';
    const audio = createAudio({ profile });

    // 首次任何手势先解锁音频（spec §6 autoplay 政策）
    addEventListener('pointerdown', () => audio.unlock(), { once: true, capture: true });

    /** 显式选中的 slot（点 Agent 键设定）。命令键只作用于它，null=未选。 */
    let focusedSlot = null;
    /** 各 slot 最近状态。 */
    const lastState = ['idle', 'idle', 'idle', 'idle', 'idle', 'idle'];

    let director = null;
    let live = null;

    // --- Live 语音派活：Web Speech API（spec §「网页」） ---
    /** 当前识别会话，null=未在录音。 */
    let recognition = null;
    /** 已确认（isFinal）的转写文字，跨 onresult 事件累积。 */
    let sttFinalText = '';
    /** 防止 onend/onerror 都触发导致重复 finish。 */
    let sttFinished = false;

    /** 识别结束（正常 stop 或出错）后统一收口：读闭包里的 final 文字并决定是否派活。
     * 之所以不在 onPttEnd 里直接读 sttFinalText，是因为 onresult 是异步的——
     * 松开按钮调 recognition.stop() 后，最后一段 isFinal 结果可能还没到，
     * 浏览器保证它在 onend 之前触发，所以真正的收口逻辑放在 onend（onerror 兜底）里。 */
    function finishPtt() {
      if (sttFinished) return;
      sttFinished = true;
      const text = sttFinalText.trim();
      recognition = null;
      if (!text) {
        kbd.flashLcd('没听清');
        return;
      }
      live?.sendCommand('prompt', focusedSlot, text);
      kbd.flashLcd(`🎙 已派活：${text}`);
    }

    function startSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        kbd.flashLcd('此浏览器不支持语音，用键盘');
        return;
      }
      sttFinalText = '';
      sttFinished = false;
      try {
        recognition = new SR();
        recognition.lang = 'zh-CN';
        recognition.interimResults = true;
        recognition.continuous = false;
        recognition.onresult = (ev) => {
          let interim = '';
          for (let i = ev.resultIndex; i < ev.results.length; i++) {
            const r = ev.results[i];
            if (r.isFinal) sttFinalText += r[0].transcript;
            else interim += r[0].transcript;
          }
          kbd.setLcd(`🎙 ${sttFinalText}${interim}`);
        };
        recognition.onend = finishPtt;
        recognition.onerror = finishPtt;
        recognition.start();
      } catch {
        recognition = null;
        kbd.flashLcd('此浏览器不支持语音，用键盘');
      }
    }

    const kbd = createToyKeyboard({
      root: document.getElementById('root'),
      handlers: {
        onAgentKey(slotId) {
          audio.keyUp('agent'); haptic('tap');
          focusedSlot = slotId;
          kbd.setFocused(slotId);
          const who = liveMode ? (slotLabel(slotId) || `agent ${slotId}`) : `agent ${slotId}`;
          kbd.flashLcd(`已选中 ${who}（◎✓/⊗ 只作用于它）`);
          if (liveMode) live?.sendCommand('focus', slotId);
          else director?.focus(slotId);
        },
        onCmd(action) {
          audio.keyUp('cmd'); haptic('press');
          // 命令键必须先显式选中一盏 Agent 灯，绝不自动挑（防误注入到别的会话/对话窗口）。
          if ((action === 'accept' || action === 'reject' || action === 'quick') && focusedSlot === null) {
            kbd.flashLcd('先点一盏 Agent 灯选中它，再按此键');
            haptic('alert');
            return;
          }
          if (liveMode) {
            if (action === 'accept' || action === 'reject') {
              live?.sendCommand(action, focusedSlot);
              kbd.flashLcd(`${action === 'accept' ? '◎✓ 接受' : '⊗ 拒绝'} → ${slotLabel(focusedSlot) || ('agent ' + focusedSlot)}`);
            } else if (action === 'quick') {
              live?.sendCommand('quick', focusedSlot); // 注入回车：推进"按 Enter 继续"类提示
              kbd.flashLcd(`⚡ 继续（回车）→ ${slotLabel(focusedSlot) || ('agent ' + focusedSlot)}`);
            } else if (action === 'new_session') {
              kbd.flashLcd('💭 新会话请在电脑上开 claude/codex，会自动上灯');
            } else if (action === 'branch') {
              kbd.flashLcd('⤴ 分叉是电脑端操作，手机不远程执行');
            }
            return;
          }
          // demo 模式
          if (action === 'accept') director?.approve(focusedSlot);
          else if (action === 'reject') director?.reject(focusedSlot);
          else if (action === 'quick') kbd.flashLcd('⚡ 已催 agent 一把（继续）');
          else if (action === 'branch') kbd.flashLcd('⤴ 从当前思路分叉一条新线（demo）');
          else if (action === 'new_session') kbd.flashLcd('💭 新会话线程已创建（demo）');
        },
        onPttStart() {
          audio.pttStart(); haptic('alert');
          if (liveMode) {
            if (focusedSlot === null) {
              kbd.flashLcd('先选中一盏 Agent 灯再语音');
              return;
            }
            startSpeechRecognition();
          }
        },
        onPttEnd() {
          audio.pttStop(); haptic('press');
          if (liveMode) {
            // 未聚焦 / 不支持 / 启动失败时 recognition 为 null，什么都不做。
            if (recognition) {
              try { recognition.stop(); } catch { /* ignore */ }
            }
            // 收口在 recognition.onend（见 finishPtt），这里只负责喊停。
            return;
          }
          director?.voicePrompt(focusedSlot);
        },
        onKnob(level) {
          audio.knobTick(); haptic('detent');
          if (liveMode) kbd.flashLcd(`思考力度显示 ${level}（远程不改真 agent 设置）`);
          else kbd.flashLcd(`思考力度 → ${level}（agent 表示压力${level === 'XHIGH' ? '山大' : '不大'}）`);
        },
        onJoy(dir) {
          audio.keyUp('cmd'); haptic('tap');
          if (dir === 'left' || dir === 'right') {
            // 在"活着的"slot 之间循环选中（live=有状态的；demo=全部 6 个）
            const active = liveMode ? activeSlots() : [0, 1, 2, 3, 4, 5];
            if (active.length === 0) { kbd.flashLcd('暂无活跃 agent'); return; }
            const cur = active.indexOf(focusedSlot);
            const next = active[(cur + (dir === 'right' ? 1 : active.length - 1) + active.length) % active.length];
            focusedSlot = next;
            kbd.setFocused(next);
            kbd.flashLcd(`焦点 → ${slotLabel(next) || ('agent ' + next)}`);
            if (liveMode) live?.sendCommand('focus', next);
            else director?.focus(next);
          } else {
            kbd.flashLcd(dir === 'up' ? '↟ 回到顶部' : '↡ 滚动日志');
          }
        },
        onTouch() {
          audio.keyUp('touch'); haptic('tap');
          kbd.flashLcd('触摸传感器：嘀。（长按切换音色）');
        },
        onTouchLongPress() {
          const next = (localStorage.getItem('toy-profile') || 'pom') === 'pom' ? 'pok' : 'pom';
          localStorage.setItem('toy-profile', next);
          audio.setProfile(next);
          audio.keyUp('cmd'); haptic('alert');
          kbd.flashLcd(`音色 → ${next === 'pom' ? 'POM 清脆轴' : 'POK 静音轴'}`);
        },
      },
    });

    /** slotId → 项目名（label），来自 live state 广播。 */
    const slotLabels = {};
    const slotLabel = (id) => slotLabels[id] || null;
    /** live 模式下"活跃"（收到过状态）的 slotId 列表，升序。 */
    const activeSlots = () => Object.keys(slotLabels).map(Number).sort((a, b) => a - b);

    if (liveMode) {
      kbd.setMicDisabled(false); // 键可按，松开时提示二期
      kbd.setLcd('LIVE · 连接中…');
      live = connectLive({
        token,
        onState(slotId, state, label) {
          lastState[slotId] = state;
          if (label) slotLabels[slotId] = label;
          kbd.applyState(slotId, state);
          if (state === 'needs_input') {
            haptic('alert');
            const who = slotLabel(slotId) || `agent ${slotId}`;
            kbd.setLcd(`${who} 需要你 — 点它选中再按 ◎✓/⊗`);
          }
        },
        onLcd(text) { kbd.setLcd(text); },
        onConnection(s) {
          kbd.setConnection(s);
          if (s === 'connected') kbd.setLcd('LIVE · 已连接你的真 agent');
          if (s === 'disconnected') kbd.setLcd('断线了，重连中…（灯保持最后状态）');
        },
      });
    } else {
      kbd.setConnection('off');
      director = createDemoDirector({
        onState(slotId, state) {
          lastState[slotId] = state;
          kbd.applyState(slotId, state);
          if (state === 'needs_input') haptic('alert');
        },
        onLcd(text) { kbd.setLcd(text); },
        onFocus(slotId) { kbd.flashLcd(`焦点 → agent ${slotId}`); },
      });
      director.start();
      kbd.setLcd("LET'S BUILD — demo 上电，agent 们开工了");
    }
  </script>
</body>
</html>
