<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n-title>OpenMicro</title>
  <style>
    body {
      font-family: ui-monospace, monospace;
      background: #111;
      color: #ddd;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }
    h1 { font-size: 1.1rem; color: #fff; margin: 0; }
    #qr { background: #fff; padding: 12px; border-radius: 8px; line-height: 0; }
    #qr svg { width: 240px; height: 240px; display: block; }
    #url {
      font-size: 0.85rem;
      word-break: break-all;
      max-width: 320px;
      text-align: center;
      color: #9cf;
    }
    #hint { font-size: 0.8rem; color: #888; }
  </style>
</head>
<body>
  <h1 data-i18n="pair.heading">scan with your phone to open OpenMicro</h1>
  <div id="qr">generating…</div>
  <div id="url"></div>
  <div id="hint" data-i18n="pair.hint">phone must be on the same LAN as this computer</div>

  <script src="/vendor/qrcode/qrcode.js"></script>
  <script type="module">
    import { t, getLang } from '/toy/i18n.js';

    document.documentElement.lang = getLang() === 'zh' ? 'zh-CN' : 'en';
    document.querySelector('[data-i18n-title]').textContent = t('pair.title');
    document.querySelector('[data-i18n="pair.heading"]').textContent = t('pair.heading');
    document.querySelector('[data-i18n="pair.hint"]').textContent = t('pair.hint');
    document.getElementById('qr').textContent = t('pair.generating');

    (async () => {
      const qrEl = document.getElementById('qr');
      const urlEl = document.getElementById('url');
      try {
        const res = await fetch('/api/pair');
        if (!res.ok) throw new Error(`pair api ${res.status}`);
        let { mobileUrl } = await res.json();
        // /pair?live=1 → encode the Live-mode URL (tracks real agents) instead
        // of the default Demo-mode URL, so scanning goes straight to live.
        if (new URLSearchParams(location.search).get('live') === '1' && !/[?&]live=1/.test(mobileUrl)) {
          mobileUrl += (mobileUrl.includes('?') ? '&' : '?') + 'live=1';
        }
        urlEl.textContent = mobileUrl;
        const qr = qrcode(0, 'M');
        qr.addData(mobileUrl);
        qr.make();
        qrEl.innerHTML = qr.createSvgTag({ scalable: true });
      } catch (err) {
        qrEl.textContent = t('pair.error');
        urlEl.textContent = String(err && err.message ? err.message : err);
      }
    })();
  </script>
</body>
</html>
