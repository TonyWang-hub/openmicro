name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host:
    name: Host (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm i

      - name: Run tests
        run: npm test

  web:
    name: Web client (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        working-directory: web
        run: node --test "test/**/*.test.js"

  web-e2e:
    name: Web demo E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run demo smoke test
        working-directory: web
        run: npm run test:e2e

  app:
    name: App (Flutter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Run tests
        working-directory: app
        # Golden (screenshot) tests are excluded: they're a local visual
        # regression tool and macOS/Linux font rendering differences make
        # pixel comparisons unreliable in CI. See test/device_golden_test.dart.
        run: flutter test --exclude-tags golden

      - name: Analyze
        working-directory: app
        run: flutter analyze
